<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeReps &mdash; Legal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #150B24;
            color: #E0E0E0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.7;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #FFFFFF;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #A855F7;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .links a {
            display: block;
            padding: 1rem 1.5rem;
            background-color: #1E1232;
            border: 1px solid #A855F733;
            border-radius: 0.75rem;
            color: #FFFFFF;
            text-decoration: none;
            font-size: 1.1rem;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .links a:hover {
            background-color: #2A1A42;
            border-color: #A855F7;
        }

        .links a span {
            display: block;
            color: #999;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CodeReps</h1>
        <p class="subtitle">AI-Powered LeetCode Prep</p>

        <div class="links">
            <a href="support.html">
                Support
                <span>FAQ and contact information</span>
            </a>
            <a href="privacy.html">
                Privacy Policy
                <span>How your data is handled</span>
            </a>
            <a href="terms.html">
                Terms of Service
                <span>Rules for using the app</span>
            </a>
        </div>
    </div>
</body>
</html>
