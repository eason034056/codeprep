name: LeetCodeLearner
options:
  bundleIdPrefix: com.codeprep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0

targets:
  LeetCodeLearner:
    type: application
    platform: iOS
    sources:
      - path: LeetCodeLearner
        excludes:
          - "Resources/Info.plist"
    info:
      path: LeetCodeLearner/Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        CFBundleDisplayName: "CodePrep"
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "com.googleusercontent.apps.540758161069-oo1tr22503qhi9ak7gfjqadhnpverour"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codeprep.app
        CODE_SIGN_ENTITLEMENTS: LeetCodeLearner/Resources/LeetCodeLearner.entitlements

  LeetCodeLearnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LeetCodeLearnerTests
    dependencies:
      - target: LeetCodeLearner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codeprep.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/LeetCodeLearner.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/LeetCodeLearner"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  LeetCodeLearner:
    build:
      targets:
        LeetCodeLearner: all
        LeetCodeLearnerTests: [test]
    test:
      targets:
        - LeetCodeLearnerTests
